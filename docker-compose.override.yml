services:
  open-live-trivia-api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "3006:3006"
    volumes:
      - .:/app
      - /app/node_modules
      - $HOME/.open-live-trivia_vault/open-live-trivia-firebase-adminsdk-e5krk-044318ee08.json:/root/open-live-trivia-firebase-adminsdk-e5krk-044318ee08.json:ro
    tty: true
    stdin_open: true

  open-live-trivia-db-browser:
    image: mongo-express
    container_name: open-live-trivia-db-browser
    restart: unless-stopped
    ports:
      - 8081:8081
    networks:
      - ${NETWORK_NAME:-open-live-trivia_network}
    env_file:
      - env/db-browser.env

networks:
  open-live-trivia_network:
    driver: bridge
